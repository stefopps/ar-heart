<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MeWorld AR — Hello Cube</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; font-family:system-ui,sans-serif; touch-action:none; }
  #badge {
    position:fixed; top:12px; left:12px; z-index:10;
    background:rgba(10,10,20,0.85); border:1px solid rgba(255,255,255,0.1);
    border-radius:10px; padding:6px 12px; pointer-events:none;
  }
  #badge .label { color:#888; font-size:9px; text-transform:uppercase; letter-spacing:1px; }
  #badge .value { color:#e0e0e0; font-weight:600; font-size:13px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #hint {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10;
    color:#888; font-size:12px; text-align:center; pointer-events:none;
    max-width:90vw; line-height:1.45;
  }
  #swapBar {
    position:fixed; bottom:56px; left:50%; transform:translateX(-50%); z-index:20;
    display:flex; gap:8px; align-items:center;
  }
  #swapBar button, #swapBar label {
    background:#ff6600; color:#000; border:none; border-radius:8px;
    padding:10px 14px; font-weight:600; font-size:13px; cursor:pointer;
  }
  #swapBar button.secondary { background:rgba(255,255,255,0.12); color:#e0e0e0; }
  #fileInput { display:none; }
  #statusMsg {
    position:fixed; top:56px; left:12px; z-index:10;
    color:#aaa; font-size:11px; max-width:70vw; pointer-events:none;
  }
  #statusMsg.error { color:#ff5555; }
  #previewPanel {
    position:fixed; top:12px; right:12px; z-index:25;
    width:min(300px, 46vw);
    background:rgba(10,10,20,0.92); border:1px solid rgba(255,102,0,0.35);
    border-radius:12px; overflow:hidden; box-shadow:0 8px 28px rgba(0,0,0,0.45);
  }
  #previewPanel header {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.08);
    color:#ff6600; font-size:11px; font-weight:600; letter-spacing:0.4px;
  }
  #previewPanel header span { color:#666; font-weight:400; font-size:10px; }
  #previewAxisHint {
    padding:4px 10px 0; color:#8f8; font-size:10px; letter-spacing:0.3px;
  }
  #previewAxisHint b { color:#00ff88; }
  #previewCanvasWrap { width:100%; height:200px; cursor:grab; position:relative; }
  #previewCanvasWrap:active { cursor:grabbing; }
  #lightControls {
    padding:8px 10px 10px; border-top:1px solid rgba(255,255,255,0.08);
    display:flex; flex-direction:column; gap:6px;
  }
  #lightControls .row {
    display:grid; grid-template-columns:62px 1fr 32px; gap:6px; align-items:center;
  }
  #lightControls label { color:#888; font-size:10px; }
  #lightControls input[type=range] { width:100%; accent-color:#ff6600; }
  #lightControls .val { color:#ccc; font-size:10px; text-align:right; font-variant-numeric:tabular-nums; }
  #lightControls .toggleRow { display:flex; gap:8px; margin-top:2px; }
  #lightControls button {
    flex:1; background:rgba(255,255,255,0.08); color:#ddd; border:none;
    border-radius:6px; padding:6px 8px; font-size:10px; cursor:pointer;
  }
  #lightControls button:hover { background:rgba(255,102,0,0.25); color:#fff; }

  /* Phone: hide desktop preview tooling — AR + touch only */
  @media (max-width: 900px), (hover: none) and (pointer: coarse) {
    #previewPanel { display:none !important; }
    #swapBar { bottom:72px; }
    #swapBar label, #swapBar button { padding:8px 12px; font-size:12px; }
    #hint { bottom:16px; font-size:11px; color:rgba(255,255,255,0.7); }
  }
</style>
<!-- v=13: phone AR touch + lit materials + desktop preview UP axis -->
<script src="js/three.js"></script>
<script src="js/GLTFLoader.js"></script>
<script src="js/OrbitControls.js"></script>
<script src="jsartoolkit5/artoolkit.min.js"></script>
<script src="jsartoolkit5/artoolkit.api.js"></script>
<script src="threex/threex-artoolkitsource.js"></script>
<script src="threex/threex-artoolkitcontext.js"></script>
<script src="threex/threex-arbasecontrols.js"></script>
<script src="threex/threex-armarkercontrols.js"></script>
<script src="threex/threex-arsmoothedcontrols.js"></script>
</head>
<body>

<div id="badge">
  <div class="label">MeWorld AR</div>
  <div class="value" id="badgeValue">Hello Cube</div>
</div>
<div id="statusMsg"></div>
<div id="hint">Point at Hiro marker · swipe rotate · pinch zoom · two-finger pan · double-tap reset</div>

<div id="previewPanel">
  <header>MODEL PREVIEW <span id="previewLabel">—</span></header>
  <div id="previewAxisHint"><b>GREEN = UP</b> (Y+) — same up on phone AR</div>
  <div id="previewCanvasWrap"></div>
  <div id="lightControls">
    <div class="row">
      <label>Ambient</label>
      <input id="lightAmbient" type="range" min="0" max="3" step="0.05" value="1.20">
      <span class="val" id="lightAmbientVal">1.20</span>
    </div>
    <div class="row">
      <label>Key</label>
      <input id="lightKey" type="range" min="0" max="4" step="0.05" value="1.80">
      <span class="val" id="lightKeyVal">1.80</span>
    </div>
    <div class="row">
      <label>Fill</label>
      <input id="lightFill" type="range" min="0" max="2" step="0.05" value="0.60">
      <span class="val" id="lightFillVal">0.60</span>
    </div>
    <div class="row">
      <label>Orbit Y</label>
      <input id="lightOrbit" type="range" min="0" max="360" step="1" value="40">
      <span class="val" id="lightOrbitVal">40°</span>
    </div>
    <div class="row">
      <label>Height</label>
      <input id="lightHeight" type="range" min="0.5" max="8" step="0.1" value="5.0">
      <span class="val" id="lightHeightVal">5.0</span>
    </div>
    <div class="toggleRow">
      <button type="button" id="lightResetBtn">Reset lights</button>
      <button type="button" id="lightSaveBtn">Save settings</button>
      <button type="button" id="lightApplyArBtn">Apply to AR</button>
    </div>
  </div>
</div>

<div id="swapBar">
  <label for="fileInput">Load local model</label>
  <input id="fileInput" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json">
  <button type="button" class="secondary" id="resetCubeBtn">Reset to cube</button>
</div>

<script>
// ============================================================
// SWAP CONFIG — leave empty for cube, or point at a file under /models
// ============================================================
var MODEL_URL = 'models/retopology.glb';

var scene, camera, renderer, clock, deltaTime, totalTime;
var arToolkitSource, arToolkitContext, smoothedControls;
var markerRoot1;
var touchOrbit;      // user rotate / pinch / pan
var contentRoot;     // holds either cube or loaded model
var currentContent;
var objectUrlToRevoke = null;

var previewScene, previewCamera, previewRenderer, previewControls, previewRoot;
var previewAmbient, previewKey, previewFill;
var arAmbient, arKey, arFill, arHemi;

// Touch interaction state
var isTouching = false;
var touchLastX = 0, touchLastY = 0;
var touchStartDistance = 0;
var touchStartScale = 1;
var currentScale = 1;
var targetRotY = 0, targetRotX = 0;
var currentRotY = 0, currentRotX = 0;
var panX = 0, panY = 0;
var targetPanX = 0, targetPanY = 0;
var touchMoved = false;
var lastTapAt = 0;
var SETTINGS_KEY = 'meworld-ar-settings-v13';

initialize();
animate();

function isPhoneUI() {
  return window.matchMedia('(max-width: 900px), (hover: none) and (pointer: coarse)').matches;
}

function setStatus(msg, isError) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg || '';
  el.className = isError ? 'error' : '';
}

function setBadge(name) {
  document.getElementById('badgeValue').textContent = name;
  var pl = document.getElementById('previewLabel');
  if (pl) pl.textContent = name;
}

function fmt(n, d) {
  return Number(n).toFixed(d === undefined ? 2 : d);
}

/** Soften PBR so models aren't black without an env map (preview + AR). */
function softenMaterials(root) {
  root.traverse(function(obj) {
    if (!obj.isMesh || !obj.material) return;
    var mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    for (var i = 0; i < mats.length; i++) {
      var m = mats[i];
      if (!m) continue;
      m = m.clone();
      mats[i] = m;
      if (m.metalness !== undefined) m.metalness = Math.min(m.metalness, 0.2);
      if (m.roughness !== undefined) m.roughness = Math.max(m.roughness, 0.4);
      if (m.color && m.color.getHex() === 0x000000) m.color.setHex(0x999999);
      if (m.side !== undefined) m.side = THREE.DoubleSide;
      m.needsUpdate = true;
    }
    obj.material = Array.isArray(obj.material) ? mats : mats[0];
  });
}

function updateLightPositions() {
  if (!previewKey) return;
  var deg = Number(document.getElementById('lightOrbit').value);
  var height = Number(document.getElementById('lightHeight').value);
  var rad = deg * Math.PI / 180;
  var radius = 4;
  previewKey.position.set(Math.cos(rad) * radius, height, Math.sin(rad) * radius);
  previewFill.position.set(Math.cos(rad + Math.PI) * 2.5, Math.max(0.5, height * 0.35), Math.sin(rad + Math.PI) * 2.5);
  document.getElementById('lightOrbitVal').textContent = Math.round(deg) + '°';
  document.getElementById('lightHeightVal').textContent = fmt(height, 1);
}

function applyPreviewLightsFromUI(opts) {
  opts = opts || {};
  if (!previewAmbient) return;
  var a = Number(document.getElementById('lightAmbient').value);
  var k = Number(document.getElementById('lightKey').value);
  var f = Number(document.getElementById('lightFill').value);
  previewAmbient.intensity = a;
  previewKey.intensity = k;
  previewFill.intensity = f;
  document.getElementById('lightAmbientVal').textContent = fmt(a);
  document.getElementById('lightKeyVal').textContent = fmt(k);
  document.getElementById('lightFillVal').textContent = fmt(f);
  updateLightPositions();
  if (opts.persist) saveSettings();
}

function applyLightsToAR() {
  if (!arAmbient || !arKey) return;
  // If preview exists, copy from preview; else from sliders/defaults
  if (previewAmbient) {
    arAmbient.intensity = previewAmbient.intensity;
    arKey.intensity = previewKey.intensity;
    arKey.position.copy(previewKey.position);
    if (arFill && previewFill) {
      arFill.intensity = previewFill.intensity;
      arFill.position.copy(previewFill.position);
    }
  } else {
    arAmbient.intensity = Number(document.getElementById('lightAmbient').value);
    arKey.intensity = Number(document.getElementById('lightKey').value);
  }
  setStatus('Lighting applied to AR');
  saveSettings();
}

function collectSettings() {
  return {
    ambient: document.getElementById('lightAmbient').value,
    key: document.getElementById('lightKey').value,
    fill: document.getElementById('lightFill').value,
    orbit: document.getElementById('lightOrbit').value,
    height: document.getElementById('lightHeight').value,
    arAmbient: arAmbient ? arAmbient.intensity : null,
    arKey: arKey ? arKey.intensity : null,
    savedAt: Date.now()
  };
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(collectSettings()));
    setStatus('Settings saved on this device');
  } catch (e) {
    setStatus('Could not save settings (private mode?)', true);
  }
}

function loadSettings() {
  try {
    var raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (data.ambient != null) document.getElementById('lightAmbient').value = data.ambient;
    if (data.key != null) document.getElementById('lightKey').value = data.key;
    if (data.fill != null) document.getElementById('lightFill').value = data.fill;
    if (data.orbit != null) document.getElementById('lightOrbit').value = data.orbit;
    if (data.height != null) document.getElementById('lightHeight').value = data.height;
    return true;
  } catch (e) {
    return false;
  }
}

function resetLights() {
  document.getElementById('lightAmbient').value = '1.20';
  document.getElementById('lightKey').value = '1.80';
  document.getElementById('lightFill').value = '0.60';
  document.getElementById('lightOrbit').value = '40';
  document.getElementById('lightHeight').value = '5.0';
  applyPreviewLightsFromUI();
  applyLightsToAR();
}

function resetPose() {
  targetRotY = 0;
  targetRotX = 0;
  currentRotY = 0;
  currentRotX = 0;
  targetPanX = 0;
  targetPanY = 0;
  panX = 0;
  panY = 0;
  currentScale = 1;
  touchStartScale = 1;
  if (touchOrbit) {
    touchOrbit.scale.set(1, 1, 1);
    touchOrbit.rotation.set(0, 0, 0);
    touchOrbit.position.set(0, 0, 0);
  }
  setStatus('Pose reset');
}

function wireLightControls() {
  ['lightAmbient', 'lightKey', 'lightFill', 'lightOrbit', 'lightHeight'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      applyPreviewLightsFromUI();
    });
    document.getElementById(id).addEventListener('change', function() {
      applyPreviewLightsFromUI({ persist: true });
    });
  });
  document.getElementById('lightResetBtn').addEventListener('click', resetLights);
  document.getElementById('lightSaveBtn').addEventListener('click', function() {
    applyLightsToAR();
    saveSettings();
  });
  document.getElementById('lightApplyArBtn').addEventListener('click', applyLightsToAR);
}

function initPreview() {
  // Skip heavy preview GL on pure phone UI
  if (isPhoneUI()) return;

  var wrap = document.getElementById('previewCanvasWrap');
  var w = wrap.clientWidth || 260;
  var h = wrap.clientHeight || 200;

  previewScene = new THREE.Scene();
  previewScene.background = new THREE.Color(0x12121a);

  previewCamera = new THREE.PerspectiveCamera(40, w / h, 0.01, 100);
  previewCamera.position.set(1.6, 1.2, 2.0);

  previewRenderer = new THREE.WebGLRenderer({ antialias: true });
  previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  previewRenderer.setSize(w, h);
  wrap.appendChild(previewRenderer.domElement);

  previewAmbient = new THREE.AmbientLight(0xffffff, 1.2);
  previewScene.add(previewAmbient);
  previewScene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 0.7));

  previewKey = new THREE.DirectionalLight(0xffffff, 1.8);
  previewKey.position.set(3, 5, 2);
  previewScene.add(previewKey);

  previewFill = new THREE.DirectionalLight(0x8899ff, 0.6);
  previewFill.position.set(-2, 1, -2);
  previewScene.add(previewFill);

  var grid = new THREE.GridHelper(2, 8, 0x444455, 0x2a2a35);
  previewScene.add(grid);

  // Axes: X red, Y green (UP), Z blue — plus a tall UP arrow
  var axes = new THREE.AxesHelper(1.15);
  previewScene.add(axes);
  var upArrow = new THREE.ArrowHelper(
    new THREE.Vector3(0, 1, 0),
    new THREE.Vector3(0, 0, 0),
    1.35,
    0x00ff88,
    0.18,
    0.1
  );
  previewScene.add(upArrow);

  previewRoot = new THREE.Group();
  previewScene.add(previewRoot);

  previewControls = new THREE.OrbitControls(previewCamera, previewRenderer.domElement);
  previewControls.enableDamping = true;
  previewControls.dampingFactor = 0.12;
  previewControls.rotateSpeed = 0.45;
  previewControls.zoomSpeed = 0.8;
  previewControls.target.set(0, 0.4, 0);

  wireLightControls();
  applyPreviewLightsFromUI();
  window.addEventListener('resize', resizePreview);
}

function resizePreview() {
  if (!previewRenderer) return;
  var wrap = document.getElementById('previewCanvasWrap');
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  if (!w || !h) return;
  previewCamera.aspect = w / h;
  previewCamera.updateProjectionMatrix();
  previewRenderer.setSize(w, h);
}

function syncPreviewFromContent() {
  if (!previewRoot || !currentContent) return;

  while (previewRoot.children.length) {
    previewRoot.remove(previewRoot.children[0]);
  }

  var clone = currentContent.clone(true);
  clone.position.set(0, 0, 0);
  clone.rotation.set(0, 0, 0);
  clone.scale.set(1, 1, 1);
  softenMaterials(clone);
  previewRoot.add(clone);

  var box = new THREE.Box3().setFromObject(clone);
  var size = box.getSize(new THREE.Vector3());
  var center = box.getCenter(new THREE.Vector3());
  var maxDim = Math.max(size.x, size.y, size.z) || 1;
  var s = 1.2 / maxDim;
  clone.scale.setScalar(s);
  clone.position.set(-center.x * s, -center.y * s + 0.35, -center.z * s);

  previewControls.target.set(0, 0.35, 0);
  previewCamera.position.set(1.6, 1.1, 2.0);
  previewControls.update();
}

function setupTouchControls() {
  var canvas = renderer.domElement;

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    isTouching = true;
    touchMoved = false;
    if (e.touches.length === 1) {
      touchLastX = e.touches[0].clientX;
      touchLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      touchStartDistance = Math.sqrt(dx * dx + dy * dy);
      touchStartScale = currentScale;
      touchLastX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      touchLastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 1 && isTouching) {
      var dx = e.touches[0].clientX - touchLastX;
      var dy = e.touches[0].clientY - touchLastY;
      if (Math.abs(dx) + Math.abs(dy) > 6) touchMoved = true;
      targetRotY += dx * 0.005;
      targetRotX += dy * 0.005;
      targetRotX = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, targetRotX));
      touchLastX = e.touches[0].clientX;
      touchLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      touchMoved = true;
      var dx2 = e.touches[0].clientX - e.touches[1].clientX;
      var dy2 = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
      if (touchStartDistance > 0) {
        currentScale = Math.max(0.25, Math.min(4.0, touchStartScale * (dist / touchStartDistance)));
        touchOrbit.scale.setScalar(currentScale);
      }
      var mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      targetPanX += (mx - touchLastX) * 0.002;
      targetPanY -= (my - touchLastY) * 0.002;
      touchLastX = mx;
      touchLastY = my;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    if (e.touches.length === 0) {
      isTouching = false;
      touchStartDistance = 0;
      // Double-tap (no drag) resets pose to original
      var now = Date.now();
      if (!touchMoved && (now - lastTapAt) < 320) {
        resetPose();
        lastTapAt = 0;
      } else if (!touchMoved) {
        lastTapAt = now;
      } else {
        lastTapAt = 0;
      }
    }
  });

  var mouseDown = false;
  var mouseMoved = false;
  var lastClickAt = 0;
  canvas.addEventListener('mousedown', function(e) {
    mouseDown = true;
    mouseMoved = false;
    touchLastX = e.clientX;
    touchLastY = e.clientY;
  });
  canvas.addEventListener('mousemove', function(e) {
    if (!mouseDown) return;
    var dx = e.clientX - touchLastX;
    var dy = e.clientY - touchLastY;
    if (Math.abs(dx) + Math.abs(dy) > 4) mouseMoved = true;
    targetRotY += dx * 0.005;
    targetRotX += dy * 0.005;
    targetRotX = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, targetRotX));
    touchLastX = e.clientX;
    touchLastY = e.clientY;
  });
  canvas.addEventListener('mouseup', function() {
    mouseDown = false;
  });
  canvas.addEventListener('dblclick', function(e) {
    e.preventDefault();
    resetPose();
  });
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    currentScale = Math.max(0.25, Math.min(4.0, currentScale - e.deltaY * 0.001));
    touchOrbit.scale.setScalar(currentScale);
  }, { passive: false });
}

function initialize() {
  scene = new THREE.Scene();

  // Stronger default AR lighting so PBR models aren't black on phone
  arAmbient = new THREE.AmbientLight(0xffffff, 1.25);
  scene.add(arAmbient);
  arHemi = new THREE.HemisphereLight(0xffffff, 0x556677, 0.85);
  scene.add(arHemi);
  arKey = new THREE.DirectionalLight(0xffffff, 1.8);
  arKey.position.set(3, 6, 4);
  scene.add(arKey);
  arFill = new THREE.DirectionalLight(0xffeedd, 0.7);
  arFill.position.set(-4, 2, -2);
  scene.add(arFill);

  camera = new THREE.Camera();
  scene.add(camera);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true,
    powerPreference: 'high-performance'
  });
  renderer.setClearColor(new THREE.Color('lightgrey'), 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0px';
  renderer.domElement.style.left = '0px';
  document.body.appendChild(renderer.domElement);

  setupTouchControls();

  clock = new THREE.Clock();
  deltaTime = 0;
  totalTime = 0;

  arToolkitSource = new THREEx.ArToolkitSource({
    sourceType: 'webcam'
  });

  function onResize() {
    arToolkitSource.onResize();
    arToolkitSource.copySizeTo(renderer.domElement);
    if (arToolkitContext.arController !== null) {
      arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
    }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2.5));
  }

  arToolkitSource.init(function onReady() {
    onResize();
  });

  window.addEventListener('resize', function() {
    onResize();
  });

  arToolkitContext = new THREEx.ArToolkitContext({
    cameraParametersUrl: 'data/camera_para.dat',
    detectionMode: 'mono'
  });

  arToolkitContext.init(function onCompleted() {
    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
  });

  markerRoot1 = new THREE.Group();
  scene.add(markerRoot1);

  new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
    type: 'pattern',
    patternUrl: 'data/hiro.patt'
  });

  var smoothedRoot = new THREE.Group();
  scene.add(smoothedRoot);
  smoothedControls = new THREEx.ArSmoothedControls(smoothedRoot, {
    lerpPosition: 0.8,
    lerpQuaternion: 0.8,
    lerpScale: 1
  });

  touchOrbit = new THREE.Group();
  smoothedRoot.add(touchOrbit);

  contentRoot = new THREE.Group();
  touchOrbit.add(contentRoot);

  // Restore saved lighting (per-browser / per-phone localStorage)
  loadSettings();
  initPreview();
  // Push slider values into AR lights (quiet — no status toast)
  if (previewAmbient) {
    applyPreviewLightsFromUI();
    arAmbient.intensity = previewAmbient.intensity;
    arKey.intensity = previewKey.intensity;
    arKey.position.copy(previewKey.position);
    if (arFill && previewFill) {
      arFill.intensity = previewFill.intensity;
      arFill.position.copy(previewFill.position);
    }
  } else {
    arAmbient.intensity = Number(document.getElementById('lightAmbient').value);
    arKey.intensity = Number(document.getElementById('lightKey').value);
    if (arFill) arFill.intensity = Number(document.getElementById('lightFill').value);
  }

  showCube();

  if (MODEL_URL) {
    loadModelFromUrl(MODEL_URL, MODEL_URL.split('/').pop());
  }

  document.getElementById('fileInput').addEventListener('change', onLocalFilePicked);
  document.getElementById('resetCubeBtn').addEventListener('click', function() {
    showCube();
    setStatus('Reset to placeholder cube');
  });
}

function clearContent() {
  while (contentRoot.children.length) {
    contentRoot.remove(contentRoot.children[0]);
  }
  currentContent = null;
  if (objectUrlToRevoke) {
    URL.revokeObjectURL(objectUrlToRevoke);
    objectUrlToRevoke = null;
  }
}

function showCube() {
  clearContent();

  var Geo = THREE.BoxGeometry || THREE.CubeGeometry;
  var geometry = new Geo(1, 1, 1);
  var material = new THREE.MeshNormalMaterial({
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });

  var cube = new THREE.Mesh(geometry, material);
  cube.position.y = 0.5;
  contentRoot.add(cube);
  currentContent = cube;

  setBadge('Hello Cube');
  setStatus(isPhoneUI()
    ? 'Cube ready — point at marker, then swipe / pinch'
    : 'Placeholder cube — load a local .glb to replace it');
  syncPreviewFromContent();
}

function fitAndPlace(object3d) {
  var box = new THREE.Box3().setFromObject(object3d);
  var size = box.getSize(new THREE.Vector3());
  var center = box.getCenter(new THREE.Vector3());
  var maxDim = Math.max(size.x, size.y, size.z);

  if (!isFinite(maxDim) || maxDim === 0) {
    throw new Error('Model has empty bounding box');
  }

  var scale = 1.0 / maxDim;
  object3d.scale.setScalar(scale);
  object3d.position.x = -center.x * scale;
  object3d.position.y = -center.y * scale + 0.5;
  object3d.position.z = -center.z * scale;
}

function placeAsContent(object3d, label) {
  clearContent();
  softenMaterials(object3d);
  fitAndPlace(object3d);
  contentRoot.add(object3d);
  currentContent = object3d;
  setBadge(label || 'Loaded model');
  syncPreviewFromContent();
}

function loadModelFromUrl(url, label) {
  setStatus('Loading ' + (label || url) + '...');
  var loader = new THREE.GLTFLoader();
  loader.load(
    url,
    function(gltf) {
      if (!gltf || !gltf.scene) {
        setStatus('Loader returned no scene', true);
        return;
      }
      try {
        placeAsContent(gltf.scene, label || 'Model');
        setStatus('Loaded ' + (label || url) + (isPhoneUI() ? ' — swipe / pinch to move' : ''));
      } catch (e) {
        setStatus(String(e.message || e), true);
        showCube();
      }
    },
    function(xhr) {
      if (xhr && xhr.total) {
        var pct = Math.round(xhr.loaded / xhr.total * 100);
        setStatus('Loading ' + (label || 'model') + ' — ' + pct + '%');
      }
    },
    function(err) {
      console.error('[AR] GLB load error:', err);
      setStatus('Failed to load model — need real glTF (.glb).', true);
    }
  );
}

function onLocalFilePicked(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;

  var name = file.name.toLowerCase();
  if (!name.endsWith('.glb') && !name.endsWith('.gltf')) {
    setStatus('Use a .glb or .gltf file', true);
    e.target.value = '';
    return;
  }

  if (name.endsWith('.glb')) {
    var headerReader = new FileReader();
    headerReader.onload = function() {
      var u8 = new Uint8Array(headerReader.result);
      var magic = String.fromCharCode(u8[0], u8[1], u8[2], u8[3]);
      if (magic !== 'glTF') {
        setStatus('Not a glTF file (header "' + magic + '"). Convert OBJ or export glTF Binary.', true);
        e.target.value = '';
        return;
      }
      var url = URL.createObjectURL(file);
      objectUrlToRevoke = url;
      loadModelFromUrl(url, file.name);
      e.target.value = '';
    };
    headerReader.onerror = function() {
      setStatus('Could not read file', true);
      e.target.value = '';
    };
    headerReader.readAsArrayBuffer(file.slice(0, 4));
    return;
  }

  var url = URL.createObjectURL(file);
  objectUrlToRevoke = url;
  loadModelFromUrl(url, file.name);
  e.target.value = '';
}

function update() {
  if (arToolkitSource.ready !== false) {
    arToolkitContext.update(arToolkitSource.domElement);
  }
  smoothedControls.update(markerRoot1);

  currentRotY += (targetRotY - currentRotY) * 0.15;
  currentRotX += (targetRotX - currentRotX) * 0.15;
  panX += (targetPanX - panX) * 0.15;
  panY += (targetPanY - panY) * 0.15;

  if (touchOrbit) {
    touchOrbit.rotation.y = currentRotY;
    touchOrbit.rotation.x = currentRotX;
    touchOrbit.position.x = panX;
    touchOrbit.position.y = panY;
  }

  if (previewControls) previewControls.update();
}

function render() {
  renderer.render(scene, camera);
  if (previewRenderer) previewRenderer.render(previewScene, previewCamera);
}

function animate() {
  requestAnimationFrame(animate);
  deltaTime = clock.getDelta();
  totalTime += deltaTime;
  update();
  render();
}
</script>

</body>
</html>
