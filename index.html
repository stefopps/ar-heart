<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MeWorld AR — Hello Cube</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
  #badge {
    position:fixed; top:12px; left:12px; z-index:10;
    background:rgba(10,10,20,0.85); border:1px solid rgba(255,255,255,0.1);
    border-radius:10px; padding:6px 12px; pointer-events:none;
  }
  #badge .label { color:#888; font-size:9px; text-transform:uppercase; letter-spacing:1px; }
  #badge .value { color:#e0e0e0; font-weight:600; font-size:13px; }
  #hint {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:10;
    color:#888; font-size:12px; text-align:center; pointer-events:none;
  }
</style>
<!-- v=11 cube baseline: Stemkoski smoothed-controls hello cube + MeWorld flyer -->
<script src="js/three.js"></script>
<script src="jsartoolkit5/artoolkit.min.js"></script>
<script src="jsartoolkit5/artoolkit.api.js"></script>
<script src="threex/threex-artoolkitsource.js"></script>
<script src="threex/threex-artoolkitcontext.js"></script>
<script src="threex/threex-arbasecontrols.js"></script>
<script src="threex/threex-armarkercontrols.js"></script>
<script src="threex/threex-arsmoothedcontrols.js"></script>
</head>
<body>

<div id="badge">
  <div class="label">MeWorld AR</div>
  <div class="value">Hello Cube</div>
</div>
<div id="hint">Point camera at the Hiro marker on the flyer</div>

<!--
  Baseline adapted from Lee Stemkoski AR-Examples smoothed-controls.html
  https://github.com/stemkoski/AR-Examples
  Full crimson-racer history: branch archive/v10-crimson-racer
-->

<script>
var scene, camera, renderer, clock, deltaTime, totalTime;
var arToolkitSource, arToolkitContext, smoothedControls;
var markerRoot1;
var mesh1;

initialize();
animate();

function initialize() {
  scene = new THREE.Scene();

  var ambientLight = new THREE.AmbientLight(0xcccccc, 0.5);
  scene.add(ambientLight);

  camera = new THREE.Camera();
  scene.add(camera);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
  });
  renderer.setClearColor(new THREE.Color('lightgrey'), 0);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0px';
  renderer.domElement.style.left = '0px';
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();
  deltaTime = 0;
  totalTime = 0;

  arToolkitSource = new THREEx.ArToolkitSource({
    sourceType: 'webcam'
  });

  function onResize() {
    arToolkitSource.onResize();
    arToolkitSource.copySizeTo(renderer.domElement);
    if (arToolkitContext.arController !== null) {
      arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
    }
  }

  arToolkitSource.init(function onReady() {
    onResize();
  });

  window.addEventListener('resize', function() {
    onResize();
  });

  arToolkitContext = new THREEx.ArToolkitContext({
    cameraParametersUrl: 'data/camera_para.dat',
    detectionMode: 'mono'
  });

  arToolkitContext.init(function onCompleted() {
    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
  });

  // Canonical Stemkoski hierarchy:
  // markerRoot and smoothedRoot are SIBLINGS under scene
  markerRoot1 = new THREE.Group();
  scene.add(markerRoot1);

  new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
    type: 'pattern',
    patternUrl: 'data/hiro.patt'
  });

  var smoothedRoot = new THREE.Group();
  scene.add(smoothedRoot);
  smoothedControls = new THREEx.ArSmoothedControls(smoothedRoot, {
    lerpPosition: 0.8,
    lerpQuaternion: 0.8,
    lerpScale: 1
  });

  var geometry1 = new THREE.CubeGeometry(1, 1, 1);
  var material1 = new THREE.MeshNormalMaterial({
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });

  mesh1 = new THREE.Mesh(geometry1, material1);
  mesh1.position.y = 0.5;
  smoothedRoot.add(mesh1);
}

function update() {
  if (arToolkitSource.ready !== false) {
    arToolkitContext.update(arToolkitSource.domElement);
  }
  smoothedControls.update(markerRoot1);
}

function render() {
  renderer.render(scene, camera);
}

function animate() {
  requestAnimationFrame(animate);
  deltaTime = clock.getDelta();
  totalTime += deltaTime;
  update();
  render();
}
</script>

</body>
</html>
