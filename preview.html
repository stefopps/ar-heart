<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>3D Preview — Retopology</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#1a1a2e; font-family:system-ui,sans-serif; }
  canvas { display:block; }
  .info {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.75); color:#aaa; padding:8px 20px; border-radius:20px;
    font-size:12px; pointer-events:none; transition:opacity 0.5s;
  }
  .info.loaded { opacity:0; }
  .controls-hint {
    position:fixed; top:20px; right:20px;
    background:rgba(0,0,0,0.6); color:#888; padding:6px 14px; border-radius:8px;
    font-size:11px; pointer-events:none;
  }
  #loading {
    position:fixed; inset:0; z-index:10; background:#1a1a2e;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#e0e0e0; transition:opacity 0.6s;
  }
  #loading.gone { opacity:0; pointer-events:none; }
  .spinner {
    width:36px; height:36px; border:3px solid rgba(255,255,255,0.1);
    border-top-color:#ff6600; border-radius:50%; animation:spin 0.8s linear infinite;
    margin:16px 0;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <p>Retopology — Houdini 22</p>
  <div class="spinner"></div>
  <p id="loadStatus" style="color:#888;font-size:12px">Loading model...</p>
</div>

<div class="info" id="info">Loading...</div>
<div class="controls-hint">Drag to orbit &bull; Scroll to zoom &bull; Right-drag to pan</div>

<script src="js/three.js"></script>
<script src="js/GLTFLoader.js"></script>
<script src="js/OrbitControls.js"></script>

<script>
var scene, camera, renderer, controls;
var modelGroup;

init();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  // Lighting
  scene.add(new THREE.AmbientLight(0x404060, 0.8));
  var key = new THREE.DirectionalLight(0xffffff, 1.5);
  key.position.set(5, 8, 5);
  scene.add(key);
  var fill = new THREE.DirectionalLight(0xff8866, 0.6);
  fill.position.set(-3, 2, -3);
  scene.add(fill);
  var rim = new THREE.DirectionalLight(0x6688ff, 0.5);
  rim.position.set(0, 0, -5);
  scene.add(rim);

  // Ground grid
  var grid = new THREE.GridHelper(4, 20, 0x333344, 0x222233);
  grid.position.y = -0.5;
  scene.add(grid);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(3, 2, 4);
  camera.lookAt(0, 0.3, 0);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.3, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 0.5;
  controls.maxDistance = 15;
  controls.update();

  // Load GLB
  var loader = new THREE.GLTFLoader();
  modelGroup = new THREE.Group();
  scene.add(modelGroup);

  var url = 'models/retopology.glb?v=' + Date.now();

  loader.load(url, function(gltf) {
    var model = gltf.scene;
    var box = new THREE.Box3().setFromObject(model);
    var size = box.getSize(new THREE.Vector3());
    var maxDim = Math.max(size.x, size.y, size.z);
    var scale = 0.8 / maxDim;
    model.scale.set(scale, scale, scale);
    model.position.set(0, 0.3, 0);
    modelGroup.add(model);

    document.getElementById('loading').classList.add('gone');
    var info = document.getElementById('info');
    info.textContent = 'Retopology — orbit with mouse/touch';
    info.classList.add('loaded');
  }, function(xhr) {
    if (xhr.total) {
      var pct = Math.round(xhr.loaded / xhr.total * 100);
      document.getElementById('loadStatus').textContent = 'Loading... ' + pct + '%';
    }
  }, function(err) {
    document.getElementById('loadStatus').textContent = 'Error loading model';
    console.error('GLB error:', err);
  });

  window.addEventListener('resize', onResize);
  animate();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
</script>
</body>
</html>
